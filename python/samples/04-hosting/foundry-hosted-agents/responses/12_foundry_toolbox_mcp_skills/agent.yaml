# yaml-language-server: $schema=https://raw.githubusercontent.com/microsoft/AgentSchema/refs/heads/main/schemas/v1.0/ContainerAgent.yaml
kind: hosted
name: hosted-toolbox-mcp-skills
protocols:
  - protocol: responses
    version: 2.0.0
resources:
  cpu: "0.25"
  memory: 0.5Gi
environment_variables:
  - name: AZURE_AI_MODEL_DEPLOYMENT_NAME
    value: ${AZURE_AI_MODEL_DEPLOYMENT_NAME}
  - name: TOOLBOX_ENDPOINT
    # Full versioned MCP endpoint of the skills toolbox the agent consumes.
    # Create the skills and toolbox from the bundled skills/ folder and
    # toolbox.yaml, then copy the versioned endpoint it prints and store it in
    # your azd environment before you run or deploy:
    #   azd ai toolbox create maf-skills-toolbox --from-file ./toolbox.yaml
    #   azd env set TOOLBOX_ENDPOINT "<endpoint-from-output>"
    value: ${TOOLBOX_ENDPOINT}
