name: personal-finance-claw
description: >
  A production-ready Agent Framework claw harness for personal finance, hosted by Foundry.
metadata:
  tags:
    - Agent Framework
    - AI Agent Hosting
    - Azure AI AgentServer
    - Responses Protocol
    - Harness
    - CodeAct
    - Monty
    - Observability
    - Purview
template:
  name: personal-finance-claw
  kind: hosted
  protocols:
    - protocol: responses
      version: 2.0.0
  environment_variables:
    - name: AZURE_AI_MODEL_DEPLOYMENT_NAME
      value: "{{AZURE_AI_MODEL_DEPLOYMENT_NAME}}"
    - name: ENABLE_SENSITIVE_DATA
      value: "false"
    - name: FOUNDRY_TOOLBOX_MCP_SERVER_URL
      value: "{{FOUNDRY_TOOLBOX_MCP_SERVER_URL}}"
    - name: PURVIEW_CLIENT_APP_ID
      value: "{{PURVIEW_CLIENT_APP_ID}}"
resources: []
