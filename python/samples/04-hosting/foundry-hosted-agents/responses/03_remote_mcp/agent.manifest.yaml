name: agent-framework-agent-with-remote-mcp-tools
description: >
  An Agent Framework agent with remote MCP tools hosted by Foundry.
metadata:
  tags:
    - Agent Framework
    - AI Agent Hosting
    - Azure AI AgentServer
    - Responses Protocol
    - Streaming
template:
  name: agent-framework-agent-with-remote-mcp-tools
  kind: hosted
  protocols:
    - protocol: responses
      version: 1.0.0
  environment_variables:
    - name: MODEL_DEPLOYMENT_NAME
      value: "{{MODEL_DEPLOYMENT_NAME}}"
    - name: GITHUB_PAT
      value: ${GITHUB_PAT}
    - name: TOOLBOX_NAME
      value: ${TOOLBOX_NAME}
resources:
  - kind: model
    id: gpt-4.1-mini
    name: MODEL_DEPLOYMENT_NAME
