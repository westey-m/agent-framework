# yaml-language-server: $schema=https://raw.githubusercontent.com/microsoft/AgentSchema/refs/heads/main/schemas/v1.0/AgentManifest.yaml
name: hosted-files
displayName: "Hosted Files Agent"

description: >
  A hosted agent that answers questions over a small set of files bundled
  with its container image (under /app/resources/). Two local C# function
  tools (ListFiles, ReadFile) surface the bundled file contents to the model.

metadata:
  tags:
    - AI Agent Hosting
    - Azure AI AgentServer
    - Responses Protocol
    - Bundled Files
    - Local Tools
    - Agent Framework

template:
  name: hosted-files
  kind: hosted
  protocols:
    - protocol: responses
      version: 1.0.0
  resources:
    cpu: "0.25"
    memory: 0.5Gi
parameters:
  properties: []
resources: []
