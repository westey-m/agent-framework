name: agent-framework-workflows
description: >
  An Agent Framework workflow hosted by Foundry.
metadata:
  tags:
    - Agent Framework
    - AI Agent Hosting
    - Azure AI AgentServer
    - Responses Protocol
    - Streaming
template:
  name: agent-framework-workflows
  kind: hosted
  protocols:
    - protocol: responses
      version: 1.0.0
  environment_variables:
    - name: MODEL_DEPLOYMENT_NAME
      value: "{{MODEL_DEPLOYMENT_NAME}}"
resources:
  - kind: model
    id: gpt-4.1-mini
    name: MODEL_DEPLOYMENT_NAME