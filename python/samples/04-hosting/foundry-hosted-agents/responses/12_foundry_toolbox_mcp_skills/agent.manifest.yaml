name: hosted-toolbox-mcp-skills
displayName: "Hosted Toolbox MCP Skills Agent"

description: >
  A hosted agent that discovers MCP-based skills from a Foundry Toolbox
  and makes them available to the agent via the agent skills provider.

metadata:
  tags:
    - AI Agent Hosting
    - Azure AI AgentServer
    - Responses Protocol
    - Agent Framework
    - MCP
    - Model Context Protocol
    - Agent Skills
    - Foundry Toolbox
    - Foundry Toolbox Skills

template:
  name: hosted-toolbox-mcp-skills
  kind: hosted
  protocols:
    - protocol: responses
      version: 2.0.0
  resources:
    cpu: "0.25"
    memory: 0.5Gi
  environment_variables:
    - name: AZURE_AI_MODEL_DEPLOYMENT_NAME
      value: "{{AZURE_AI_MODEL_DEPLOYMENT_NAME}}"
    - name: TOOLBOX_ENDPOINT
      # Full versioned MCP endpoint of the skills toolbox the agent consumes.
      # Create the skills and toolbox from the bundled skills/ folder and
      # toolbox.yaml, then copy the versioned endpoint it prints and store it
      # in your azd environment before you run or deploy:
      #   azd ai toolbox create maf-skills-toolbox --from-file ./toolbox.yaml
      #   azd env set TOOLBOX_ENDPOINT "<endpoint-from-output>"
      value: "{{TOOLBOX_ENDPOINT}}"
resources:
  - kind: model
    id: gpt-5
    name: AZURE_AI_MODEL_DEPLOYMENT_NAME
