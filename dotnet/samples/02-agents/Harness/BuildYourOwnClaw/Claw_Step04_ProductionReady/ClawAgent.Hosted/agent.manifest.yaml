# yaml-language-server: $schema=https://raw.githubusercontent.com/microsoft/AgentSchema/refs/heads/main/schemas/v1.0/AgentManifest.yaml
name: personal-finance-claw
displayName: "Personal Finance Claw"

description: >
  A production-ready personal finance claw hosted as a Foundry Hosted Agent with
  Agent Framework harness capabilities, observability, optional Purview governance,
  local finance skills, shell, CodeAct, and background agents.

metadata:
  tags:
    - AI Agent Hosting
    - Azure AI AgentServer
    - Responses Protocol
    - Agent Framework
    - Observability
    - Purview
    - Evaluation

template:
  name: personal-finance-claw
  kind: hosted
  protocols:
    - protocol: responses
      version: 2.0.0
  resources:
    cpu: "1.0"
    memory: 2Gi
parameters:
  properties: []
resources: []
