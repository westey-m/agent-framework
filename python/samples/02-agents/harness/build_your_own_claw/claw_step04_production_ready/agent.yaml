# yaml-language-server: $schema=https://raw.githubusercontent.com/microsoft/AgentSchema/refs/heads/main/schemas/v1.0/ContainerAgent.yaml
kind: hosted
name: agent-framework-claw-production-ready-responses
protocols:
  - protocol: responses
    version: 1.0.0
resources:
  cpu: "0.5"
  memory: 1Gi
environment_variables:
  - name: AZURE_AI_MODEL_DEPLOYMENT_NAME
    value: ${AZURE_AI_MODEL_DEPLOYMENT_NAME}
  - name: ENABLE_SENSITIVE_DATA
    value: "false"
  - name: FOUNDRY_TOOLBOX_MCP_SERVER_URL
    value: ${FOUNDRY_TOOLBOX_MCP_SERVER_URL}
  - name: PURVIEW_CLIENT_APP_ID
    value: ${PURVIEW_CLIENT_APP_ID}
