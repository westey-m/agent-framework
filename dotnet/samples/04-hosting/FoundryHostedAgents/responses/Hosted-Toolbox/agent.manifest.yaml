# yaml-language-server: $schema=https://raw.githubusercontent.com/microsoft/AgentSchema/refs/heads/main/schemas/v1.0/AgentManifest.yaml
name: hosted-toolbox
displayName: "Hosted Toolbox"

description: >
  A hosted agent that loads its tools from a single Foundry Toolbox via the
  AF Foundry hosting bridge. AddFoundryToolboxes(credential, name) connects to the Foundry
  Toolboxes MCP proxy at startup and exposes the toolbox's bundled tools to the
  agent on every request. The toolbox itself is provisioned out of band; see this
  sample's README for the portal walkthrough.

metadata:
  tags:
    - AI Agent Hosting
    - Azure AI AgentServer
    - Responses Protocol
    - Agent Framework
    - Foundry Toolbox
    - MCP

template:
  name: hosted-toolbox
  kind: hosted
  protocols:
    - protocol: responses
      version: 2.0.0
  resources:
    cpu: "0.25"
    memory: 0.5Gi
  environment_variables:
    - name: AZURE_AI_MODEL_DEPLOYMENT_NAME
      value: "{{AZURE_AI_MODEL_DEPLOYMENT_NAME}}"
    - name: TOOLBOX_NAME
      value: "{{TOOLBOX_NAME}}"
parameters:
  properties:
    - name: TOOLBOX_NAME
      type: string
      default: "my-toolset"
      description: "Name of the Foundry Toolbox to load at runtime."
resources:
  - kind: model
    id: gpt-4o
    name: AZURE_AI_MODEL_DEPLOYMENT_NAME
  - kind: toolbox
    name: "{{TOOLBOX_NAME}}"
    tools: []
