# yaml-language-server: $schema=https://raw.githubusercontent.com/microsoft/AgentSchema/refs/heads/main/schemas/v1.0/AgentManifest.yaml
name: mcp-tools
displayName: "MCP Tools Agent"

description: >
  A developer assistant demonstrating dual-layer MCP integration:
  client-side GitHub MCP tools handled by the agent and server-side
  Microsoft Learn MCP tools delegated to the LLM provider.

metadata:
  tags:
    - AI Agent Hosting
    - Azure AI AgentServer
    - Responses Protocol
    - Agent Framework
    - MCP
    - Model Context Protocol

template:
  name: mcp-tools
  kind: hosted
  protocols:
    - protocol: responses
      version: 1.0.0
  resources:
    cpu: "0.25"
    memory: 0.5Gi
parameters:
  properties: []
resources: []
